<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="description" content="RS Projects LLC — Licensed contractor in Salt Lake City, Utah. Kitchen remodeling, basement finishing, custom closets, and garage upgrades."/>
<title>RS Projects LLC — Construction & Remodeling | Salt Lake City, UT</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--o:#E87722;--n:#0F1D3A;--n2:#1A2744;--g:#F4F3EF;--t:#1A1A1A;--t2:#5A5A5A;--t3:#8A8A8A;--b:rgba(0,0,0,0.08);}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Barlow',sans-serif;background:#fff;color:var(--t);overflow-x:hidden;}
/* NAV */
.nav{position:sticky;top:0;z-index:100;background:var(--n);padding:0 40px;display:flex;justify-content:space-between;align-items:center;height:70px;}
.nav-logo{display:flex;align-items:center;gap:12px;text-decoration:none;}
.nav-logo img{width:46px;height:46px;object-fit:contain;background:white;border-radius:8px;padding:2px;}
.nav-logo-name{color:white;font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;letter-spacing:1px;display:block;}
.nav-logo-sub{color:var(--o);font-size:10px;letter-spacing:2px;font-weight:600;display:block;}
.nav-right{display:flex;align-items:center;gap:22px;}
.nav-link{color:rgba(255,255,255,0.6);font-size:13px;font-weight:500;text-decoration:none;}
.nav-link:hover{color:white;}
.lang-toggle{display:flex;background:rgba(255,255,255,0.08);border-radius:6px;overflow:hidden;}
.lang-btn{padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:transparent;color:rgba(255,255,255,0.5);}
.lang-btn.on{background:var(--o);color:white;}
.nav-cta{background:var(--o);color:white;border:none;padding:10px 22px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;}
/* HERO */
.hero{background:var(--n);min-height:90vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:80px 40px;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(232,119,34,0.12),transparent 70%);pointer-events:none;}
.hero-logo{width:110px;height:110px;background:white;border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 28px;border:3px solid rgba(232,119,34,0.25);}
.hero-logo img{width:100px;height:100px;object-fit:contain;}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(232,119,34,0.12);border:1px solid rgba(232,119,34,0.3);border-radius:30px;padding:6px 18px;margin-bottom:20px;}
.hero-badge-dot{width:7px;height:7px;background:var(--o);border-radius:50%;}
.hero-badge-text{color:var(--o);font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;}
.hero h1{font-family:'Barlow Condensed',sans-serif;font-size:clamp(42px,7vw,80px);font-weight:700;color:white;line-height:1.0;margin-bottom:16px;}
.hero h1 em{color:var(--o);font-style:normal;}
.hero-sub{font-size:17px;color:rgba(255,255,255,0.55);max-width:520px;line-height:1.7;margin-bottom:32px;font-weight:300;}
.hero-btns{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-bottom:56px;}
.btn-p{background:var(--o);color:white;border:none;padding:16px 36px;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;}
.btn-o{background:transparent;color:white;border:1.5px solid rgba(255,255,255,0.2);padding:16px 36px;border-radius:10px;font-size:15px;cursor:pointer;}
.hero-stats{display:flex;gap:48px;justify-content:center;flex-wrap:wrap;padding-top:32px;border-top:1px solid rgba(255,255,255,0.07);}
.stat-num{font-family:'Barlow Condensed',sans-serif;font-size:42px;font-weight:700;color:white;}
.stat-num span{color:var(--o);}
.stat-lbl{font-size:11px;color:rgba(255,255,255,0.35);margin-top:4px;letter-spacing:0.5px;text-transform:uppercase;}
/* SECTIONS */
.sec{padding:80px 40px;}
.sec-alt{background:var(--g);}
.sec-head{text-align:center;margin-bottom:48px;}
.sec-pill{display:inline-block;background:rgba(232,119,34,0.1);color:var(--o);font-size:11px;font-weight:700;padding:5px 16px;border-radius:30px;margin-bottom:10px;letter-spacing:1.5px;text-transform:uppercase;}
.sec-title{font-family:'Barlow Condensed',sans-serif;font-size:clamp(28px,4vw,44px);font-weight:700;color:var(--t);}
.sec-sub{color:var(--t2);margin-top:8px;font-size:15px;font-weight:300;}
/* SERVICES */
.srv-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;max-width:1000px;margin:0 auto;}
.srv-card{background:white;border:1px solid var(--b);border-radius:20px;padding:32px 28px;transition:all .25s;}
.srv-card:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,0.08);border-color:rgba(232,119,34,0.2);}
.srv-card.ft{border-top:3px solid var(--o);}
.srv-icon{width:50px;height:50px;background:rgba(232,119,34,0.08);border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:18px;}
.srv-card h3{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;margin-bottom:10px;}
.srv-card p{font-size:14px;color:var(--t2);line-height:1.7;font-weight:300;}
.srv-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:16px;}
.srv-tag{background:var(--g);color:var(--t2);font-size:11px;font-weight:600;padding:4px 12px;border-radius:20px;}
/* PROCESS */
.proc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:0;max-width:960px;margin:0 auto;}
.proc-step{text-align:center;padding:0 20px 20px;}
.proc-num{width:56px;height:56px;background:var(--n);color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;margin:0 auto 16px;box-shadow:0 0 0 3px var(--o);}
.proc-step h4{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;margin-bottom:7px;}
.proc-step p{font-size:13px;color:var(--t2);line-height:1.6;font-weight:300;}
/* GALLERY */
.gal-tabs{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:32px;}
.gtab{cursor:pointer;padding:9px 20px;border-radius:30px;border:1.5px solid var(--b);background:white;color:var(--t2);font-size:13px;font-weight:600;transition:all .2s;}
.gtab:hover{border-color:var(--o);color:var(--o);}
.gtab.on{background:var(--n);border-color:var(--n);color:white;}
.gal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;max-width:1000px;margin:0 auto;}
.gcard{border-radius:20px;overflow:hidden;border:1px solid var(--b);background:white;transition:all .25s;}
.gcard:hover{transform:translateY(-3px);box-shadow:0 16px 48px rgba(0,0,0,0.1);}
.gcard-imgs{display:grid;grid-template-columns:1fr 1fr;height:200px;}
.gcard-img{position:relative;overflow:hidden;}
.gcard-img img{width:100%;height:100%;object-fit:cover;transition:transform .3s;}
.gcard:hover .gcard-img img{transform:scale(1.05);}
.img-lbl{position:absolute;top:8px;left:8px;font-size:10px;font-weight:700;padding:3px 10px;border-radius:4px;letter-spacing:1px;}
.lbl-b{background:rgba(0,0,0,0.65);color:white;}
.lbl-a{background:var(--o);color:white;}
.gcard-body{padding:16px 18px 18px;}
.gcard-cat{font-size:10px;font-weight:700;color:var(--o);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px;}
.gcard-title{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;margin-bottom:4px;}
.gcard-desc{font-size:13px;color:var(--t2);line-height:1.6;font-weight:300;}
/* CONTACT */
.ct-layout{display:grid;grid-template-columns:1fr 1.6fr;gap:48px;max-width:960px;margin:0 auto;align-items:start;}
.ct-info h3{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:700;margin-bottom:12px;}
.ct-info p{font-size:14px;color:var(--t2);line-height:1.7;margin-bottom:28px;font-weight:300;}
.ci-row{display:flex;align-items:center;gap:14px;margin-bottom:16px;}
.ci-icon{width:40px;height:40px;background:rgba(232,119,34,0.1);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ci-lbl{font-size:11px;color:var(--t3);font-weight:600;letter-spacing:0.5px;text-transform:uppercase;}
.ci-val{font-size:14px;color:var(--t);font-weight:500;margin-top:1px;}
.ct-form{background:white;border:1px solid var(--b);border-radius:20px;padding:32px;}
.f-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;font-weight:700;color:var(--t2);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:6px;}
.field input,.field select,.field textarea{width:100%;padding:12px 16px;border:1.5px solid var(--b);border-radius:8px;font-size:14px;color:var(--t);font-family:'Barlow',sans-serif;outline:none;background:white;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--o);}
.field textarea{resize:vertical;min-height:90px;}
.f-submit{width:100%;background:var(--n);color:white;border:none;padding:15px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Barlow Condensed',sans-serif;margin-top:4px;letter-spacing:0.5px;transition:background .2s;}
.f-submit:hover{background:var(--o);}
.f-note{font-size:12px;color:var(--t3);text-align:center;margin-top:10px;}
.toast{display:none;background:#EAF3DE;border:1px solid #639922;border-radius:8px;padding:12px;color:#3B6D11;font-size:13px;text-align:center;margin-top:12px;}
.toast.show{display:block;}
/* FOOTER */
.footer{background:var(--n);padding:36px 40px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:24px;align-items:center;}
.ft-brand{display:flex;align-items:center;gap:12px;}
.ft-logo{width:40px;height:40px;background:white;border-radius:8px;padding:2px;display:flex;align-items:center;justify-content:center;}
.ft-logo img{width:36px;height:36px;object-fit:contain;}
.ft-name{color:white;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;}
.ft-tag{color:rgba(255,255,255,0.3);font-size:11px;margin-top:2px;}
.ft-copy{color:rgba(255,255,255,0.25);font-size:12px;text-align:center;}
.ft-badge{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:8px 16px;color:rgba(255,255,255,0.4);font-size:12px;text-align:right;}
@media(max-width:768px){
  .nav{padding:0 16px;} .nav-link{display:none;}
  .hero{padding:60px 20px;} .hero-stats{gap:20px;}
  .sec{padding:56px 20px;} .ct-layout{grid-template-columns:1fr;}
  .footer{grid-template-columns:1fr;text-align:center;} .ft-brand{justify-content:center;}
  .ft-badge{text-align:center;} .f-row{grid-template-columns:1fr;}
}
</style>
</head>

let lang='en', tab=0;

function go(id){document.getElementById(id).scrollIntoView({behavior:'smooth'});}

function setLang(l){
  lang=l;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('on',b.textContent===l.toUpperCase()));
  render();
}

function setTab(i){
  tab=i;
  document.querySelectorAll('.gtab').forEach((b,idx)=>b.classList.toggle('on',idx===i));
  renderGallery();
}

function renderGallery(){
  const t=T[lang];
  const ps=tab===0?PROJ[lang]:PROJ[lang].filter(p=>p.c===tab);
  document.getElementById('ggrid').innerHTML=ps.map(p=>`
    <div class="gcard">
      <div class="gcard-imgs">
        <div class="gcard-img"><img src="${p.b}" alt="Before"/><span class="img-lbl lbl-b">${t.lb}</span></div>
        <div class="gcard-img"><img src="${p.a}" alt="After"/><span class="img-lbl lbl-a">${t.la}</span></div>
      </div>
      <div class="gcard-body">
        <div class="gcard-cat">${p.cl}</div>
        <div class="gcard-title">${p.ti}</div>
        <div class="gcard-desc">${p.de}</div>
      </div>
    </div>`).join('');
}

function handleSubmit(e){
  e.preventDefault();
  const n=document.getElementById('fn').value.trim();
  if(!n){document.getElementById('fn').focus();return;}
  const data={
    name:document.getElementById('fn').value,
    phone:document.getElementById('ph').value,
    email:document.getElementById('em').value,
    service:document.getElementById('sv').value,
    message:document.getElementById('mg').value
  };
  fetch('https://formspree.io/f/mqewobgq',{
    method:'POST',
    headers:{'Content-Type':'application/json','Accept':'application/json'},
    body:JSON.stringify(data)
  })
  .then(r=>r.json())
  .then(data=>{
    const t=document.getElementById('toast');
    t.textContent=T[lang].toast; t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),6000);
    ['fn','ph','em','mg'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('sv').selectedIndex=0;
  })
  .catch(err=>{
    console.error(err);
    alert('Error sending form. Please call us at (561) 584-2451');
  });
}
function submitForm(){handleSubmit(event);}
